# The Deployment configuration file for Prefect. This file defines the deployment of the Prefect Flow, including its schedule and parameters.
name: starrocks-pipeline
prefect-version: ">=3.0.0"

pull:
- prefect.deployments.steps.git_clone:
    repository: "{{ prefect.blocks.github-repository.ildki-repo.repository_url }}"
    branch: main
    credentials: "{{ prefect.blocks.github-repository.ildki-repo.credentials }}"

deployments:
- name: ildki-dbt-deployment
  entrypoint: dbt_runner.py:general_dbt_runner
  parameters:
    dbt_command: "build"
  # schedule:
  #   cron: "*/5 * * * *"   # setiap 5 menit
  #   timezone: "Asia/Jakarta"
  work_pool:
    name: ildki-dbt-pool  # Must match the pool created in Prefect UI
    job_variables:
      namespace: prefect-dbt
      image: "fathur15/dbt:latest"
      finished_job_ttl: 10
      # These limits ensure it doesn't starve your other apps
      cpu_limit: "1"
      memory_limit: "2Gi"
      env:
        STARROCKS_HOST: "kube-starrocks-fe-service.starrocks.svc.cluster.local"
        STARROCKS_USER: "{{ prefect.blocks.secret.starrocks-user }}"
        STARROCKS_PASS: "{{ prefect.blocks.secret.starrocks-pass }}"
        STARROCKS_DB: "{{ prefect.blocks.secret.starrocks-db }}"
        STARROCKS_PORT: "{{ prefect.blocks.secret.starrocks-port }}"
        HTTP_PROXY: "http://10.15.3.21:80/" 
        HTTPS_PROXY: "http://10.15.3.21:80/"
        http_proxy: "http://10.15.3.21:80/"
        https_proxy: "http://10.15.3.21:80/"
        no_proxy: "127.0.0.1,localhost,10.43.0.1,kubernetes.default.svc,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16"
        NO_PROXY: "127.0.0.1,localhost,10.43.0.1,kubernetes.default.svc,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16"  # Bypass proxy for internal service


# Hanya folder staging: run --select staging
# Staging dan semua turunannya (downstream): run --select staging+
# Hanya model tertentu di dalam staging: run --select staging.my_model_name
# Menjalankan test hanya untuk staging: test --select staging
# Build (Run + Test) hanya staging: build --select staging (Ini yang paling direkomendasikan karena dbt akan menjalankan model sekaligus memvalidasi datanya).
